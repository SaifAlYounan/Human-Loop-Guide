kind = "web"
previewPath = "/"
title = "Human-in-the-Loop Guidance System"
version = "1.0.0"
id = "artifacts/hitl-guidance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26099

[services.development]
run = "pnpm --filter @workspace/hitl-guidance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hitl-guidance", "run", "build" ]
publicDir = "artifacts/hitl-guidance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26099"
BASE_PATH = "/"
